name: Signal Newsletter

on:
  schedule:
    # Every Friday at 7:00 AM Paris time (06:00 UTC)
    - cron: "0 6 * * 5"
  workflow_dispatch:

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate and send newsletter
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: npm start

      - name: Send monthly digest (first Friday of the month)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          DAY=$(date +%d)
          if [ "$DAY" -le 7 ]; then
            echo "First Friday of the month — generating digest..."
            node src/digest.js
          else
            echo "Not the first Friday — skipping digest."
          fi

      - name: Commit history
        run: |
          git config user.name "Signal Bot"
          git config user.email "signal@raphaelch.me"
          git add history.json
          git diff --staged --quiet || git commit -m "chore: update history [skip ci]"
          git push

      - name: Send failure alert
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: node src/alert.js